<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Updating ARMGDDN Companion</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background: rgba(5, 4, 12, 0.98);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      border: 1px solid rgba(46, 242, 255, 0.2);
    }
    
    .update-container {
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    
    h2 {
      margin-bottom: 1.5rem;
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 1.2rem;
    }
    
    .status-text {
      color: var(--text-primary);
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    
    .progress-bar {
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 0.5rem;
      width: 100%;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
      width: 0%;
      transition: width 0.2s linear;
      box-shadow: var(--glow-cyan);
    }

    .progress-fill.indeterminate {
      width: 100% !important;
      background: linear-gradient(
        45deg, 
        var(--neon-cyan) 25%, 
        var(--neon-magenta) 25%, 
        var(--neon-magenta) 50%, 
        var(--neon-cyan) 50%, 
        var(--neon-cyan) 75%, 
        var(--neon-magenta) 75%, 
        var(--neon-magenta)
      );
      background-size: 40px 40px;
      animation: indeterminate-stripe 1s linear infinite;
    }

    @keyframes indeterminate-stripe {
      0% { background-position: 0 0; }
      100% { background-position: 40px 0; }
    }
    
    .details {
      display: flex;
      justify-content: space-between;
      color: var(--text-secondary);
      font-size: 0.8rem;
    }

    .manual-update {
      display: none;
      margin-top: 1rem;
      padding: 0.9rem;
      border: 1px solid rgba(255, 46, 99, 0.35);
      background: rgba(255, 46, 99, 0.08);
      border-radius: 10px;
      text-align: left;
      color: var(--text-primary);
      font-size: 0.85rem;
      line-height: 1.35;
    }

    .manual-update strong {
      color: var(--neon-magenta);
    }

    .manual-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 0.8rem;
    }

    .manual-actions button {
      border: 1px solid rgba(46, 242, 255, 0.25);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      padding: 0.45rem 0.7rem;
      border-radius: 8px;
      cursor: pointer;
    }

    .manual-actions button.primary {
      border-color: rgba(46, 242, 255, 0.55);
      background: rgba(46, 242, 255, 0.12);
    }
  </style>
</head>
<body>
  <div class="update-container">
    <h2 id="title">Downloading Update</h2>
    <div id="status" class="status-text">Preparing...</div>
    <div class="progress-bar">
      <div id="progress-fill" class="progress-fill"></div>
    </div>
    <div class="details">
      <span id="percent">0%</span>
      <span id="speed"></span>
    </div>

    <div id="manual-update" class="manual-update">
      <div><strong>Manual update required</strong></div>
      <div style="margin-top:0.5rem;">
        If the updater is stuck on verifying or verification fails, please update manually:
      </div>
      <div style="margin-top:0.5rem;">
        1) Click <strong>Open Downloads Page</strong>
      </div>
      <div>
        2) Download the latest Windows installer (<strong>.exe</strong>)
      </div>
      <div>
        3) Run the installer and follow the prompts
      </div>
      <div class="manual-actions">
        <button id="manual-close">Close</button>
        <button id="manual-open" class="primary">Open Downloads Page</button>
      </div>
    </div>
  </div>
  <script src="update.js"></script>
</body>
</html>
